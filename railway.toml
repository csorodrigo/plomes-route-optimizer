[build]
builder = "NIXPACKS"
buildCommand = "npm ci --only=production && cd frontend && npm ci --only=production && DISABLE_ESLINT_PLUGIN=true CI=false npm run build"
watchPatterns = ["**/*.js", "**/*.jsx", "**/*.ts", "**/*.tsx", "**/*.json", "frontend/src/**/*"]

[deploy]
startCommand = "NODE_ENV=production node backend/server.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[env]
NODE_ENV = "production"