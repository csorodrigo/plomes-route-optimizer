[build]
builder = "NIXPACKS"
buildCommand = "echo 'CRITICAL: Building v2.1.2 with OData Filter at: '$(date) && npm ci && cd frontend && npm ci && DISABLE_ESLINT_PLUGIN=true CI=false npm run build && echo 'Build v2.1.2 COMPLETED with OData filtering enabled'"
watchPatterns = ["**/*.js", "**/*.jsx", "**/*.ts", "**/*.tsx", "**/*.json", "frontend/src/**/*", ".railway-force-rebuild"]

[deploy]
startCommand = "NODE_ENV=production node backend/server.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[env]
NODE_ENV = "production"