[build]
builder = "NIXPACKS"
buildCommand = "echo '🚀 Starting build v2.1.2 at: '$(date) && npm install && cd frontend && npm install && DISABLE_ESLINT_PLUGIN=true CI=false npm run build && ls -la build/ && echo '✅ Frontend build completed with '$(ls -1 build/static/js/*.js | wc -l)' JS files' && cd .. && echo '✅ Build v2.1.2 COMPLETED with OData filtering enabled'"
watchPatterns = ["**/*.js", "**/*.jsx", "**/*.ts", "**/*.tsx", "**/*.json", "frontend/src/**/*", ".railway-force-rebuild"]

[deploy]
startCommand = "NODE_ENV=production node backend/server.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[env]
NODE_ENV = "production"